<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="bloco-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5edd8"/>
      <stop offset="50%" stop-color="#e8d8b8"/>
      <stop offset="100%" stop-color="#c8a878"/>
    </linearGradient>
    <filter id="shd-bloco"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000044"/></filter>
  </defs>
  <!-- bloco ósseo retangular com textura -->
  <rect x="14" y="12" width="52" height="56" rx="4" fill="url(#bloco-g)" filter="url(#shd-bloco)" stroke="#b09060" stroke-width="1"/>
  <!-- textura trabecular -->
  <line x1="14" y1="29" x2="66" y2="29" stroke="#b09060" stroke-width="0.5" opacity="0.4"/>
  <line x1="14" y1="40" x2="66" y2="40" stroke="#b09060" stroke-width="0.5" opacity="0.4"/>
  <line x1="14" y1="51" x2="66" y2="51" stroke="#b09060" stroke-width="0.5" opacity="0.4"/>
  <line x1="32" y1="12" x2="32" y2="68" stroke="#b09060" stroke-width="0.5" opacity="0.4"/>
  <line x1="50" y1="12" x2="50" y2="68" stroke="#b09060" stroke-width="0.5" opacity="0.4"/>
  <!-- textura irregular -->
  <path d="M18,20 Q22,18 26,21 Q30,18 34,20 Q38,17 42,20" fill="none" stroke="#b09060" stroke-width="0.5" opacity="0.3"/>
  <path d="M18,58 Q26,55 34,58 Q42,55 50,58 Q58,55 62,58" fill="none" stroke="#b09060" stroke-width="0.5" opacity="0.3"/>
  <!-- reflexo -->
  <rect x="17" y="14" width="8" height="52" rx="3" fill="white" fill-opacity="0.15"/>
</svg>
