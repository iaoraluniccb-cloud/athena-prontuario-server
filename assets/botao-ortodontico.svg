<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50">
  <defs>
    <radialGradient id="btn-g" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="40%" stop-color="#e0e0e0"/>
      <stop offset="75%" stop-color="#9e9e9e"/>
      <stop offset="100%" stop-color="#424242"/>
    </radialGradient>
    <filter id="shd-btn"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000055"/></filter>
  </defs>
  <!-- botão esférico metálico -->
  <circle cx="25" cy="25" r="20" fill="url(#btn-g)" filter="url(#shd-btn)" stroke="#616161" stroke-width="0.8"/>
  <!-- reflexo superior -->
  <ellipse cx="18" cy="16" rx="7" ry="5" fill="white" fill-opacity="0.5" transform="rotate(-20,18,16)"/>
  <!-- reflexo secundário pequeno -->
  <ellipse cx="32" cy="32" rx="3" ry="2" fill="white" fill-opacity="0.15"/>
  <!-- borda escura -->
  <circle cx="25" cy="25" r="19.5" fill="none" stroke="#212121" stroke-width="0.5" opacity="0.3"/>
</svg>
