<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" width="200" height="40">
  <defs>
    <linearGradient id="fio-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eceff1"/>
      <stop offset="50%" stop-color="#b0bec5"/>
      <stop offset="100%" stop-color="#78909c"/>
    </linearGradient>
    <linearGradient id="bkt-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eceff1"/>
      <stop offset="50%" stop-color="#b0bec5"/>
      <stop offset="100%" stop-color="#78909c"/>
    </linearGradient>
    <filter id="shd-ap"><feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#00000044"/></filter>
  </defs>
  <!-- fio ortodôntico -->
  <path d="M8,20 Q50,16 100,16 Q150,16 192,20" fill="none" stroke="url(#fio-g)" stroke-width="2" filter="url(#shd-ap)"/>
  <!-- braquetes metálicos (7) -->
  <g fill="url(#bkt-g)" stroke="#78909c" stroke-width="0.6">
    <!-- braquete 1 -->
    <rect x="20" y="13" width="10" height="14" rx="1.5" filter="url(#shd-ap)"/>
    <line x1="25" y1="13" x2="25" y2="27" stroke="#607d8b" stroke-width="0.8"/>
    <rect x="18" y="18" width="14" height="4" rx="1" fill="#cfd8dc"/>
    <!-- braquete 2 -->
    <rect x="44" y="12" width="10" height="14" rx="1.5" filter="url(#shd-ap)"/>
    <line x1="49" y1="12" x2="49" y2="26" stroke="#607d8b" stroke-width="0.8"/>
    <rect x="42" y="17" width="14" height="4" rx="1" fill="#cfd8dc"/>
    <!-- braquete 3 -->
    <rect x="70" y="11" width="10" height="14" rx="1.5" filter="url(#shd-ap)"/>
    <line x1="75" y1="11" x2="75" y2="25" stroke="#607d8b" stroke-width="0.8"/>
    <rect x="68" y="16" width="14" height="4" rx="1" fill="#cfd8dc"/>
    <!-- braquete 4 centro -->
    <rect x="95" y="11" width="10" height="14" rx="1.5" filter="url(#shd-ap)"/>
    <line x1="100" y1="11" x2="100" y2="25" stroke="#607d8b" stroke-width="0.8"/>
    <rect x="93" y="16" width="14" height="4" rx="1" fill="#cfd8dc"/>
    <!-- braquete 5 -->
    <rect x="120" y="11" width="10" height="14" rx="1.5" filter="url(#shd-ap)"/>
    <line x1="125" y1="11" x2="125" y2="25" stroke="#607d8b" stroke-width="0.8"/>
    <rect x="118" y="16" width="14" height="4" rx="1" fill="#cfd8dc"/>
    <!-- braquete 6 -->
    <rect x="146" y="12" width="10" height="14" rx="1.5" filter="url(#shd-ap)"/>
    <line x1="151" y1="12" x2="151" y2="26" stroke="#607d8b" stroke-width="0.8"/>
    <rect x="144" y="17" width="14" height="4" rx="1" fill="#cfd8dc"/>
    <!-- braquete 7 -->
    <rect x="170" y="13" width="10" height="14" rx="1.5" filter="url(#shd-ap)"/>
    <line x1="175" y1="13" x2="175" y2="27" stroke="#607d8b" stroke-width="0.8"/>
    <rect x="168" y="18" width="14" height="4" rx="1" fill="#cfd8dc"/>
  </g>
</svg>
