<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80" width="60" height="80">
  <defs>
    <radialGradient id="par-head" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#eceff1"/>
      <stop offset="60%" stop-color="#b0bec5"/>
      <stop offset="100%" stop-color="#607d8b"/>
    </radialGradient>
    <linearGradient id="par-body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#546e7a"/>
      <stop offset="30%" stop-color="#b0bec5"/>
      <stop offset="55%" stop-color="#eceff1"/>
      <stop offset="80%" stop-color="#b0bec5"/>
      <stop offset="100%" stop-color="#546e7a"/>
    </linearGradient>
    <filter id="shd-par"><feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#00000055"/></filter>
  </defs>
  <!-- cabeça circular Phillips -->
  <circle cx="30" cy="18" r="14" fill="url(#par-head)" filter="url(#shd-par)" stroke="#546e7a" stroke-width="0.8"/>
  <!-- fenda phillips (+) -->
  <path d="M22,18 L38,18 M30,10 L30,26" stroke="#37474f" stroke-width="2.5" stroke-linecap="round"/>
  <!-- corpo hexagonal com rosca -->
  <path d="M23,32 L23,62 Q23,68 30,70 Q37,68 37,62 L37,32 Z" fill="url(#par-body)" stroke="#546e7a" stroke-width="0.6"/>
  <!-- espiras -->
  <g stroke="#546e7a55" stroke-width="0.8" fill="none">
    <path d="M21,36 Q30,38 39,36"/><path d="M21,40 Q30,42 39,40"/>
    <path d="M21,44 Q30,46 39,44"/><path d="M21,48 Q30,50 39,48"/>
    <path d="M21,52 Q30,54 39,52"/><path d="M21,56 Q30,58 39,56"/>
    <path d="M21,60 Q30,62 39,60"/>
  </g>
  <!-- colo entre cabeça e corpo -->
  <path d="M23,31 Q30,28 37,31" fill="none" stroke="#607d8b" stroke-width="1.5"/>
  <!-- reflexo corpo -->
  <rect x="26" y="33" width="3" height="29" rx="1.5" fill="white" fill-opacity="0.2"/>
</svg>
